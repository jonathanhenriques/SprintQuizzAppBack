server.port=8083
spring.profiles.active=teste

spring.application.name=Sprint Quiz 
#server.servlet.context-path=/api/v1
#server.port=8081

#
#definir profile ativo como argumento na vm
#caminho: botao direito no projeto > run as > run configurations... > arguments >
#-Dspring.profiles.active=desenvolvimento
#


#configs JWT
#duracao 30 min
security.jwt.expiracao=1000 * 60 * 60
#base64
security.jwt.chave-assinatura=bWV1IGdhdG8gc2UgY2hhbWEgbWFkcnVndWluaGE=

# desabilita nome aleatorio para banco h2
spring.datasource.generate-unique-name=false

spring.devtools.restart.enabled=false

spring.jpa.defer-datasource-initialization=true

spring.datasource.url=jdbc:h2:mem:testbanco
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false



#atualiza as modificacoes de tabela automaticamente
spring.jpa.defer-datasource-initialization=true
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=create-drop


spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.mvc.format.time=HH:mm:ss


spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Brazil/East
 
role.padrao=ROLE_USER

#configs JWT
#duracao 30 min testar com 3600
security.jwt.expiracao=3600
#base64
security.jwt.chave-assinatura=bWV1IGdhdG8gc2UgY2hhbWEgbWFkcnVndWluaGE=


##configurando data-hora
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.mvc.format.time=HH:mm:ss

#Configs swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.packagesToScan=com.etec.tcc.sprint_quiz.controller
springdoc.swagger-ui.use-root-path=true
